<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari-Merchant | Investment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Ethiopic', sans-serif; overflow-x: hidden; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-3xl font-bold text-green-700 text-center italic mb-6">Safari-Merchant</h1>
            
            <div id="registerForm">
                <h2 class="text-xl font-bold mb-4">ይመዝገቡ</h2>
                <input type="tel" id="regPhone" placeholder="ስልክ ቁጥር (9...)" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-green-500">
                <input type="password" id="regPass" placeholder="የይለፍ ቃል" class="w-full p-3 border rounded-lg mb-4 outline-none">
                <input type="text" id="refCode" placeholder="የሪፈራል ኮድ (ካለዎት)" class="w-full p-3 border rounded-lg mb-4 bg-gray-50">
                <button onclick="handleSignUp()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">ይመዝገቡ</button>
                <p class="mt-4 text-center text-sm">አካውንት አለዎት? <a href="#" onclick="toggleAuth()" class="text-green-600 font-bold">ይግቡ</a></p>
            </div>

            <div id="loginForm" class="hidden">
                <h2 class="text-xl font-bold mb-4">ይግቡ</h2>
                <input type="tel" id="loginPhone" placeholder="ስልክ ቁጥር" class="w-full p-3 border rounded-lg mb-4 outline-none">
                <input type="password" id="loginPass" placeholder="የይለፍ ቃል" class="w-full p-3 border rounded-lg mb-4 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">ይግቡ</button>
                <p class="mt-4 text-center text-sm">አዲስ ነዎት? <a href="#" onclick="toggleAuth()" class="text-green-600 font-bold">ይመዝገቡ</a></p>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden pb-20">
        <header class="bg-green-600 text-white p-4 sticky top-0 shadow-md flex justify-between items-center">
            <span class="font-bold italic">Safari-Merchant</span>
            <div class="bg-green-800 px-3 py-1 rounded-full text-sm">ቀሪ ሂሳብ: <span id="balanceDisplay">0.00</span> ETB</div>
        </header>

        <div class="p-4 max-w-lg mx-auto">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6">
                <h3 class="font-bold mb-3 text-lg text-gray-800">ሂሳብዎን ይሙሉ (Recharge)</h3>
                <input type="number" id="rechargeAmount" placeholder="የብር መጠን" class="w-full p-3 border rounded-lg mb-3">
                <select id="bankSelect" class="w-full p-3 border rounded-lg mb-4">
                    <option value="CBE">Commercial Bank of Ethiopia (CBE)</option>
                    <option value="Awash">Awash Bank</option>
                    <option value="Dashen">Dashen Bank</option>
                </select>
                <button onclick="requestRecharge()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg">አሁኑኑ ይሙሉ</button>
            </div>

            <h3 class="font-bold mb-4 text-gray-700">የኢንቨስትመንት አማራጮች</h3>
            <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 mb-4">
                <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500" class="w-full h-32 object-cover">
                <div class="p-4">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-lg">Level 1 - Chicken Farm</span>
                        <span class="text-green-600 font-bold">500 ETB</span>
                    </div>
                    <p class="text-sm text-gray-500 mt-1">በየቀኑ 25.00 ETB ገቢ ያግኙ</p>
                    <button class="w-full mt-4 bg-green-600 text-white py-2 rounded-lg font-bold">ይግዙ</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around text-gray-400">
            <i class="fas fa-home text-green-600 text-xl"></i>
            <i class="fas fa-wallet text-xl"></i>
            <i class="fas fa-users text-xl"></i>
            <i class="fas fa-user text-xl"></i>
        </nav>
    </div>

    <script>
        // Supabase Setup
        const _supabaseUrl = 'አንተ_ከ_Supabase_የምትወስደው_URL';
        const _supabaseKey = 'አንተ_ከ_Supabase_የምትወስደው_KEY';
        const supabase = supabase.createClient(_supabaseUrl, _supabaseKey);

        function toggleAuth() {
            document.getElementById('registerForm').classList.toggle('hidden');
            document.getElementById('loginForm').classList.toggle('hidden');
        }

        // 1. መመዝገቢያ (Register)
        async function handleSignUp() {
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPass').value;
            
            const { data, error } = await supabase.auth.signUp({
                phone: '+251' + phone,
                password: password,
            });

            if (error) alert("ስህተት: " + error.message);
            else {
                alert("ምዝገባ ተሳክቷል! አሁን ይግቡ።");
                toggleAuth();
            }
        }

        // 2. መግቢያ (Login)
        async function handleLogin() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPass').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                phone: '+251' + phone,
                password: password,
            });

            if (error) alert("የስልክ ቁጥር ወይም ይለፍ ቃል ተሳስቷል!");
            else {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                // ቀሪ ሂሳቡን ከዳታቤዝ አምጣ (እዚህ ጋር Logic ይጨመራል)
            }
        }
    </script>
</body>
</html>
