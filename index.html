<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari-Merchant | ኢንቨስት ያድርጉና ያትርፉ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Ethiopic', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-green-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <h1 class="text-xl font-bold italic underline decoration-yellow-400">Safari-Merchant</h1>
            <div class="flex items-center space-x-2">
                <span id="userBalance" class="bg-green-700 px-3 py-1 rounded-full text-sm">0.00 ETB</span>
                <i class="fas fa-user-circle text-2xl"></i>
            </div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4">
        <div class="bg-gradient-to-r from-green-500 to-green-700 rounded-2xl p-6 text-white mb-6 shadow-lg">
            <h2 class="text-2xl font-bold">እንኳን ደህና መጡ!</h2>
            <p class="opacity-90">በSafari-Merchant ኢንቨስት ያድርጉ፣ በየቀኑ ትርፍ ያግኙ።</p>
            <div class="mt-4 flex space-x-2">
                <button class="bg-yellow-400 text-green-900 px-4 py-2 rounded-lg font-bold text-sm">Recharge</button>
                <button class="bg-white text-green-700 px-4 py-2 rounded-lg font-bold text-sm">Withdraw</button>
            </div>
        </div>

        <h3 class="text-lg font-bold mb-4 text-gray-800"><i class="fas fa-seedling text-green-600 mr-2"></i>የኢንቨስትመንት አማራጮች</h3>
        <div class="grid grid-cols-1 gap-4">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=500" alt="Farm" class="w-full h-32 object-cover">
                <div class="p-4">
                    <h4 class="font-bold text-gray-800 text-lg">የዶሮ እርባታ (Level 1)</h4>
                    <div class="flex justify-between text-sm mt-2 text-gray-600">
                        <span>ዋጋ: <b class="text-green-600">500 ETB</b></span>
                        <span>የቀን ገቢ: <b class="text-green-600">25 ETB</b></span>
                    </div>
                    <div class="flex justify-between text-sm mt-1 text-gray-600">
                        <span>ቆይታ: 60 ቀናት</span>
                        <span>ጠቅላላ ትርፍ: 1500 ETB</span>
                    </div>
                    <button class="w-full mt-4 bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700 transition">አሁኑኑ ይግዙ</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=500" alt="Farm" class="w-full h-32 object-cover">
                <div class="p-4">
                    <h4 class="font-bold text-gray-800 text-lg">የበቆሎ እርሻ (Level 2)</h4>
                    <div class="flex justify-between text-sm mt-2 text-gray-600">
                        <span>ዋጋ: <b class="text-green-600">1000 ETB</b></span>
                        <span>የቀን ገቢ: <b class="text-green-600 text-lg">55 ETB</b></span>
                    </div>
                    <button class="w-full mt-4 bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700 transition">አሁኑኑ ይግዙ</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-2 flex justify-around items-center max-w-lg mx-auto shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button class="flex flex-col items-center text-green-600">
            <i class="fas fa-home text-xl"></i>
            <span class="text-xs">Home</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-xs">Invest</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <i class="fas fa-users text-xl"></i>
            <span class="text-xs">Team</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <i class="fas fa-user text-xl"></i>
            <span class="text-xs">My</span>
        </button>
    </nav>

    <script>
        // ሪፈራል ኮዱን ከURL ማንበቢያ
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if(ref) {
            console.log("የሪፈራል ኮድ ተገኝቷል: " + ref);
            localStorage.setItem('referralCode', ref);
        }
    </script>
</body>
</html>
